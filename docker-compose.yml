version: "3.8"

services:
  vitals-vision-edge:
    build: .
    runtime: nvidia          # gives the container access to the Jetson GPU
    network_mode: host       # simplest networking; Agent B reachable by IP on LAN
    devices:
      - /dev/video0:/dev/video0   # USB camera; change index if needed
    restart: unless-stopped
    environment:
      CAMERA_INDEX: "0"
      YOLO_MODEL: /app/yolo_models/rf3v1.pt
      DEVICE: cuda
      YOLO_CONF: "0.5"
      PERSON_THRESH: "0.7"
      CAPTION_THRESH: "0.7"
      MIN_TRACK_FRAMES: "3"
      # ---- Ollama (VLM) --------------------------------------------------
      # When running Ollama on the Jetson host (outside Docker), use
      # localhost because network_mode is host.
      OLLAMA_HOST: http://localhost:11434
      AGENT_B_HOST: "10.42.0.255"
      AGENT_B_PORT: "9000"
      UAV_ID: UAV_1
      SECTOR: ""
